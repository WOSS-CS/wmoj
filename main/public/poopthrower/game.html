<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poop Thrower 3D</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #000; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000000;
            pointer-events: none;
            z-index: 10;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 28px;
            text-align: center;
            line-height: 20px;
            pointer-events: none;
            z-index: 10;
        }
        #blocker {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            cursor: pointer;
            z-index: 20;
        }
        #instructions {
            text-align: center;
            font-size: 22px;
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .title-text {
            font-size: 48px;
            font-weight: bold;
            color: #8b4513; /* SaddleBrown */
            text-shadow: 0 0 10px #fff;
            margin-bottom: 20px;
            display: block;
        }
        .key {
            background: #eee;
            color: #333;
            padding: 4px 10px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span></div>
    <div id="crosshair">+</div>
    <div id="blocker">
        <div id="instructions">
            <span class="title-text">Poop Thrower 3D</span>
            <span style="font-size:28px">Click to Play</span><br/><br/>
            Move: <span class="key">W</span> <span class="key">A</span> <span class="key">S</span> <span class="key">D</span><br/><br/>
            Look: <span class="key">Mouse</span><br/><br/>
            Shoot: <span class="key">Left Click</span><br/><br/>
            Jump: <span class="key">Space</span>
        </div>
    </div>

    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- Game State ---
        let score = 0;
        const scoreElement = document.getElementById('score');
        
        function updateScore() {
            scoreElement.innerText = score;
            scoreElement.style.transform = "scale(1.5)";
            scoreElement.style.color = "#ffd700";
            setTimeout(() => {
                scoreElement.style.transform = "scale(1)";
                scoreElement.style.color = "#fff";
            }, 200);
        }

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Sky blue
        scene.fog = new THREE.Fog(0x87ceeb, 0, 400);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 10;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); 
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(100, 200, 50);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 200;
        dirLight.shadow.camera.bottom = -200;
        dirLight.shadow.camera.left = -200;
        dirLight.shadow.camera.right = 200;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- Materials ---
        const brownMat = new THREE.MeshStandardMaterial({ color: 0x4a2e15, roughness: 0.9 });
        const whiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8 });
        const tpParticleMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const poopParticleMat = new THREE.MeshStandardMaterial({ color: 0x4a2e15 });

        // --- Environment ---
        const floorGeometry = new THREE.PlaneGeometry(2000, 2000, 100, 100);
        floorGeometry.rotateX(- Math.PI / 2);
        
        const gridHelper = new THREE.GridHelper(2000, 100, 0x000000, 0x000000);
        gridHelper.material.opacity = 0.2;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x3cb371, roughness: 0.8 }); // Medium Sea Green
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.receiveShadow = true;
        scene.add(floor);

        // Scenery (Trees/Obstacles)
        const sceneryMaterial = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
        const sceneryGeom = new THREE.BoxGeometry(4, 20, 4);
        for(let i=0; i<30; i++) {
            const mesh = new THREE.Mesh(sceneryGeom, sceneryMaterial);
            mesh.position.set(
                (Math.random() - 0.5) * 400,
                10,
                (Math.random() - 0.5) * 400
            );
            if(mesh.position.length() < 30) mesh.position.x += 40;
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
        }

        // --- Controls ---
        const controls = new PointerLockControls(camera, document.body);
        const blocker = document.getElementById('blocker');
        const instructions = document.getElementById('instructions');

        instructions.addEventListener('click', function () { controls.lock(); });

        controls.addEventListener('lock', function () {
            instructions.style.display = 'none';
            blocker.style.display = 'none';
        });

        controls.addEventListener('unlock', function () {
            blocker.style.display = 'flex';
            instructions.style.display = '';
        });
        scene.add(controls.getObject());

        // Movement State
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
        let prevTime = performance.now();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        const onKeyDown = function (event) {
            switch (event.code) {
                case 'ArrowUp': case 'KeyW': moveForward = true; break;
                case 'ArrowLeft': case 'KeyA': moveLeft = true; break;
                case 'ArrowDown': case 'KeyS': moveBackward = true; break;
                case 'ArrowRight': case 'KeyD': moveRight = true; break;
                case 'Space':
                    if (canJump === true) velocity.y += 350;
                    canJump = false;
                    break;
            }
        };

        const onKeyUp = function (event) {
            switch (event.code) {
                case 'ArrowUp': case 'KeyW': moveForward = false; break;
                case 'ArrowLeft': case 'KeyA': moveLeft = false; break;
                case 'ArrowDown': case 'KeyS': moveBackward = false; break;
                case 'ArrowRight': case 'KeyD': moveRight = false; break;
            }
        };

        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);

        // --- Poop Gun Model ---
        const gunGroup = new THREE.Group();
        
        const barrelGeom = new THREE.CylinderGeometry(0.3, 0.4, 3, 16);
        barrelGeom.rotateX(Math.PI / 2);
        const gunMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.4, metalness: 0.8 });
        const barrel = new THREE.Mesh(barrelGeom, gunMat);
        barrel.position.set(0, 0, -1.5);
        barrel.castShadow = true;
        gunGroup.add(barrel);

        const bodyGeom = new THREE.BoxGeometry(1, 1.2, 2);
        const gunBodyMat = new THREE.MeshStandardMaterial({ color: 0x8b4513, roughness: 0.9 });
        const gunBody = new THREE.Mesh(bodyGeom, gunBodyMat);
        gunBody.position.set(0, -0.2, 0);
        gunBody.castShadow = true;
        gunGroup.add(gunBody);

        gunGroup.position.set(1.5, -1.5, -2.5);
        camera.add(gunGroup);

        // --- Projectiles (Poop) ---
        const projectiles = [];
        
        function createPoopModel() {
            const group = new THREE.Group();
            
            const s1 = new THREE.Mesh(new THREE.SphereGeometry(0.8, 16, 16), brownMat);
            s1.scale.set(1, 0.6, 1);
            s1.castShadow = true;
            group.add(s1);
            
            const s2 = new THREE.Mesh(new THREE.SphereGeometry(0.6, 16, 16), brownMat);
            s2.position.y = 0.5;
            s2.scale.set(1, 0.6, 1);
            s2.castShadow = true;
            group.add(s2);
            
            const s3 = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), brownMat);
            s3.position.y = 0.9;
            s3.scale.set(1, 0.8, 1);
            s3.castShadow = true;
            group.add(s3);
            
            return group;
        }

        const poopBase = createPoopModel();
        let recoilTime = 0;

        function shoot() {
            if (!controls.isLocked) return;

            const poop = poopBase.clone();
            poop.position.copy(controls.getObject().position);
            
            const offset = new THREE.Vector3(1.5, -1.5, -4);
            offset.applyQuaternion(camera.quaternion);
            poop.position.add(offset);

            const shootDirection = new THREE.Vector3(0, 0, -1);
            shootDirection.applyQuaternion(camera.quaternion);

            poop.velocity = shootDirection.multiplyScalar(200); 
            poop.rotationVelocity = new THREE.Vector3(Math.random(), Math.random(), Math.random()).multiplyScalar(10);

            scene.add(poop);
            projectiles.push(poop);
            recoilTime = 0.2;
        }

        window.addEventListener('mousedown', shoot);

        // --- Flying Enemies (Toilet Paper) ---
        const enemies = [];
        
        const tpGroupGeom = new THREE.CylinderGeometry(1.5, 1.5, 3, 32);
        const tubeGeom = new THREE.CylinderGeometry(0.5, 0.5, 3.01, 16);
        const tubeMat = new THREE.MeshStandardMaterial({ color: 0xd2b48c });

        function createToiletPaper() {
            const group = new THREE.Group();
            const roll = new THREE.Mesh(tpGroupGeom, whiteMat);
            roll.castShadow = true;
            group.add(roll);

            const tube = new THREE.Mesh(tubeGeom, tubeMat);
            group.add(tube);
            
            const tailGeom = new THREE.PlaneGeometry(3, 4);
            const tailMat = new THREE.MeshStandardMaterial({ color: 0xffffff, side: THREE.DoubleSide });
            const tail = new THREE.Mesh(tailGeom, tailMat);
            tail.position.set(1.5, -2, 0);
            tail.rotation.z = Math.PI / 4;
            tail.castShadow = true;
            group.add(tail);

            return group;
        }

        function spawnEnemy() {
            if (enemies.length > 20) return;
            const enemy = createToiletPaper();
            const angle = Math.random() * Math.PI * 2;
            const distance = 80 + Math.random() * 120;
            
            enemy.position.x = controls.getObject().position.x + Math.cos(angle) * distance;
            enemy.position.z = controls.getObject().position.z + Math.sin(angle) * distance;
            enemy.position.y = 15 + Math.random() * 40;

            enemy.velocity = new THREE.Vector3(
                (Math.random() - 0.5) * 30,
                (Math.random() - 0.5) * 15,
                (Math.random() - 0.5) * 30
            );
            enemy.rotVel = new THREE.Vector3(Math.random(), Math.random(), Math.random()).multiplyScalar(2);

            scene.add(enemy);
            enemies.push(enemy);
        }

        setInterval(spawnEnemy, 1500);

        // --- Evil Toilets (Ground Enemies) ---
        const evilToilets = [];

        function createEvilToilet() {
            const group = new THREE.Group();
            
            const baseGeom = new THREE.BoxGeometry(4, 2, 5);
            const base = new THREE.Mesh(baseGeom, whiteMat);
            base.position.y = 1;
            base.castShadow = true;
            base.receiveShadow = true;
            group.add(base);

            const bowlGeom = new THREE.CylinderGeometry(2, 1.5, 2, 16);
            const bowl = new THREE.Mesh(bowlGeom, whiteMat);
            bowl.position.set(0, 3, 0.5);
            bowl.castShadow = true;
            group.add(bowl);
            
            const tankGeom = new THREE.BoxGeometry(4, 4, 2);
            const tank = new THREE.Mesh(tankGeom, whiteMat);
            tank.position.set(0, 4, -2.5);
            tank.castShadow = true;
            group.add(tank);

            // Health Bar Group (world space)
            const hpGroup = new THREE.Group();
            
            const bgGeom = new THREE.PlaneGeometry(4, 0.6);
            const bgMat = new THREE.MeshBasicMaterial({ color: 0xff0000, side: THREE.DoubleSide });
            const bgBar = new THREE.Mesh(bgGeom, bgMat);
            hpGroup.add(bgBar);

            const fgGeom = new THREE.PlaneGeometry(4, 0.6);
            const fgMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, side: THREE.DoubleSide });
            const fgBar = new THREE.Mesh(fgGeom, fgMat);
            fgGeom.translate(2, 0, 0);
            fgBar.position.x = -2;
            fgBar.position.z = 0.05; 
            hpGroup.add(fgBar);

            scene.add(hpGroup);

            group.hpGroup = hpGroup;
            group.hpBar = fgBar;
            group.hp = 5;
            group.maxHp = 5;

            return group;
        }

        function spawnEvilToilet() {
            if (evilToilets.length > 8) return;
            const toilet = createEvilToilet();
            const angle = Math.random() * Math.PI * 2;
            const distance = 150 + Math.random() * 100;
            toilet.position.x = controls.getObject().position.x + Math.cos(angle) * distance;
            toilet.position.z = controls.getObject().position.z + Math.sin(angle) * distance;
            toilet.position.y = 0;
            
            scene.add(toilet);
            evilToilets.push(toilet);
        }

        setInterval(spawnEvilToilet, 3500);

        // --- Particles (Explosion & Splatters) ---
        const particles = [];
        const particleGeom = new THREE.BoxGeometry(0.5, 0.5, 0.5);

        function createSplatter(position, material, count, baseVelocity = new THREE.Vector3()) {
            for(let i=0; i<count; i++) {
                const p = new THREE.Mesh(particleGeom, material);
                p.position.copy(position);
                p.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 30,
                    Math.random() * 20 + 10,
                    (Math.random() - 0.5) * 30
                );
                p.velocity.add(baseVelocity.clone().multiplyScalar(0.2)); // inherit momentum
                p.life = 1.0 + Math.random() * 2.0; // Life duration
                scene.add(p);
                particles.push(p);
            }
        }

        // --- Game Loop ---
        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();
            const delta = Math.min((time - prevTime) / 1000, 0.1); 

            if (controls.isLocked === true) {
                // Gun Recoil
                if (recoilTime > 0) {
                    recoilTime -= delta;
                    gunGroup.position.z = -2.5 + Math.sin(recoilTime * Math.PI * 5) * 0.5;
                    gunGroup.rotation.x = Math.sin(recoilTime * Math.PI * 5) * 0.2;
                } else {
                    gunGroup.position.z = -2.5;
                    gunGroup.rotation.x = 0;
                }

                // Movement
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 100.0 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                const speed = 600.0;
                if (moveForward || moveBackward) velocity.z -= direction.z * speed * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * speed * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                controls.getObject().position.y += (velocity.y * delta);

                if (controls.getObject().position.y < 10) {
                    velocity.y = 0;
                    controls.getObject().position.y = 10;
                    canJump = true;
                }

                const pos = controls.getObject().position;
                if(pos.x > 900) pos.x = 900;
                if(pos.x < -900) pos.x = -900;
                if(pos.z > 900) pos.z = 900;
                if(pos.z < -900) pos.z = -900;

                // Update Projectiles
                for (let i = projectiles.length - 1; i >= 0; i--) {
                    const p = projectiles[i];
                    p.position.addScaledVector(p.velocity, delta);
                    p.velocity.y -= 9.8 * 15 * delta; // Gravity
                    
                    p.rotation.x += p.rotationVelocity.x * delta;
                    p.rotation.y += p.rotationVelocity.y * delta;
                    p.rotation.z += p.rotationVelocity.z * delta;

                    let hit = false;
                    const projPos = p.position;

                    // 1. Floor Collision
                    if (projPos.y <= 0.8) {
                        hit = true;
                        createSplatter(new THREE.Vector3(projPos.x, 0.5, projPos.z), poopParticleMat, 8, p.velocity);
                    }

                    // 2. Flying TP Collision
                    if (!hit) {
                        for (let j = enemies.length - 1; j >= 0; j--) {
                            const e = enemies[j];
                            if (projPos.distanceTo(e.position) < 4.0) {
                                hit = true;
                                createSplatter(e.position, tpParticleMat, 15);
                                createSplatter(e.position, poopParticleMat, 10, p.velocity);
                                
                                scene.remove(e);
                                enemies.splice(j, 1);
                                
                                score += 100;
                                updateScore();
                                break;
                            }
                        }
                    }

                    // 3. Evil Toilet Collision
                    if (!hit) {
                        for (let j = evilToilets.length - 1; j >= 0; j--) {
                            const toilet = evilToilets[j];
                            const tCenter = toilet.position.clone().add(new THREE.Vector3(0, 3, 0));
                            if (projPos.distanceTo(tCenter) < 5.0) {
                                hit = true;
                                createSplatter(projPos, poopParticleMat, 12, p.velocity);
                                
                                toilet.hp -= 1;
                                toilet.hpBar.scale.x = Math.max(0.01, toilet.hp / toilet.maxHp);
                                
                                if (toilet.hp <= 0) {
                                    createSplatter(tCenter, tpParticleMat, 25); 
                                    createSplatter(tCenter, poopParticleMat, 15);
                                    
                                    scene.remove(toilet.hpGroup);
                                    scene.remove(toilet);
                                    evilToilets.splice(j, 1);
                                    
                                    score += 500;
                                    updateScore();
                                }
                                break;
                            }
                        }
                    }

                    if (hit || projPos.distanceTo(controls.getObject().position) > 400) {
                        scene.remove(p);
                        projectiles.splice(i, 1);
                    }
                }

                // Update Flying TP
                for (let i = enemies.length - 1; i >= 0; i--) {
                    const e = enemies[i];
                    e.position.addScaledVector(e.velocity, delta);
                    
                    e.rotation.x += e.rotVel.x * delta;
                    e.rotation.y += e.rotVel.y * delta;
                    e.rotation.z += e.rotVel.z * delta;

                    if (e.position.y < 5) {
                        e.position.y = 5;
                        e.velocity.y *= -1;
                    }
                    if (e.position.y > 80) e.velocity.y *= -1;
                    
                    const playerPos = controls.getObject().position;
                    const dirToPlayer = new THREE.Vector3().subVectors(playerPos, e.position).normalize();
                    
                    if (e.position.distanceTo(playerPos) < 200) {
                        e.velocity.addScaledVector(dirToPlayer, 25 * delta);
                    }
                    
                    if (e.velocity.length() > 50) {
                        e.velocity.normalize().multiplyScalar(50);
                    }
                }

                // Update Evil Toilets
                for (let i = evilToilets.length - 1; i >= 0; i--) {
                    const toilet = evilToilets[i];
                    const playerPos = controls.getObject().position;
                    
                    const dirToPlayer = new THREE.Vector3(playerPos.x - toilet.position.x, 0, playerPos.z - toilet.position.z);
                    const distToPlayer = dirToPlayer.length();
                    
                    if (distToPlayer > 0.1) {
                        dirToPlayer.normalize();
                        const speed = 12.0; // Slow ground movement
                        toilet.position.addScaledVector(dirToPlayer, speed * delta);
                        
                        // Face player
                        const targetRotation = Math.atan2(dirToPlayer.x, dirToPlayer.z);
                        toilet.rotation.y = targetRotation;
                    }
                    
                    // Position Health Bar above toilet and make it face camera
                    toilet.hpGroup.position.copy(toilet.position).add(new THREE.Vector3(0, 8, 0));
                    toilet.hpGroup.lookAt(camera.position);
                }

                // Update Particles
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    
                    if (p.position.y > 0.25) {
                        p.position.addScaledVector(p.velocity, delta);
                        p.velocity.y -= 9.8 * 20 * delta; // Gravity
                        p.rotation.x += 10 * delta;
                        p.rotation.y += 10 * delta;
                    } else {
                        // Splat on ground
                        p.position.y = 0.25;
                        p.velocity.set(0, 0, 0);
                        p.rotation.set(0, 0, 0);
                    }

                    p.life -= delta;
                    p.scale.setScalar(Math.max(0, Math.min(1, p.life)));

                    if (p.life <= 0) {
                        scene.remove(p);
                        particles.splice(i, 1);
                    }
                }
            }

            prevTime = time;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Start
        for(let i=0; i<8; i++) spawnEnemy();
        for(let i=0; i<4; i++) spawnEvilToilet();
        animate();
    </script>
</body>
</html>
